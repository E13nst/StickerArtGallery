meta:
  environment: jvm
  toolchain:
    name: gradle
    version: "17"
build:
  image: null
  # Amvera выполняет: gradle build ${args}. Без -x test поднимается весь граф check→test (десятки @SpringBootTest),
  # что на билдере занимает очень долго и тянет Redis по умолчанию к amvera-e13nst-run-redis.
  args: -x test bootJar --info
  artifacts:
    build/libs/*.jar: /
run:
  image: null
  jarName: sticker-art-gallery-0.0.1-SNAPSHOT.jar
  persistenceMount: /data
  containerPort: 8080
