<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лог сообщений - Админ панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script src="/admin/js/theme.js"></script>
    <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body class="bg-gray-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar будет вставлен динамически через sidebar.js -->

        <main class="flex-1 overflow-y-auto">
            <div class="p-4">
                <h2 class="text-2xl font-bold text-gray-800 dark:text-slate-100 mb-4">Лог отправки сообщений</h2>
                <div class="mb-4 flex items-center gap-2">
                    <input type="text" id="message-id-input" placeholder="Message ID..."
                        class="px-2 py-1 text-xs border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
                    <button id="apply-filters-btn" class="px-3 py-1 text-xs bg-blue-600 text-white rounded-md hover:bg-blue-700">
                        Применить
                    </button>
                    <button id="retry-btn" class="px-3 py-1 text-xs bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-slate-100 rounded-md hover:bg-slate-300 dark:hover:bg-slate-600 hidden">
                        Повторить
                    </button>
                </div>
                <div id="filters-container"></div>
                <div id="logs-table"></div>
                <div id="empty-state" class="hidden text-center py-8 text-gray-500 dark:text-slate-400 text-sm">
                    Нет записей по заданным фильтрам.
                </div>
                <div id="error-state" class="hidden text-center py-8 text-red-600 dark:text-red-400 text-sm">
                    Ошибка загрузки. <button id="error-retry-btn" class="underline">Повторить</button>
                </div>
            </div>
        </main>
    </div>

    <div id="detail-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white dark:bg-slate-900 rounded-lg shadow-xl max-w-3xl w-full max-h-[90vh] overflow-hidden flex flex-col border border-slate-200 dark:border-slate-700">
                <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center">
                    <h3 class="text-lg font-medium text-gray-900 dark:text-slate-100">Детали отправки сообщения</h3>
                    <button type="button" onclick="closeDetailModal()" class="text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200">Закрыть</button>
                </div>
                <div id="detail-content" class="p-4 overflow-y-auto flex-1 text-sm text-slate-800 dark:text-slate-200"></div>
            </div>
        </div>
    </div>

    <script src="/admin/js/utils.js"></script>
    <script src="/admin/js/api.js"></script>
    <script src="/admin/js/auth.js"></script>
    <script src="/admin/js/sidebar.js"></script>
    <script src="/admin/js/table.js"></script>
    <script src="/admin/js/filters.js"></script>
    <script src="/admin/js/message-logs.js"></script>
</body>
</html>
