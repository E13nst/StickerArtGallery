<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мем-кандидаты - Админ панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script src="/admin/js/theme.js"></script>
    <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body class="admin-page antialiased">
    <div class="flex h-screen overflow-hidden">
        <main class="flex-1 overflow-y-auto">
            <div class="p-4">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-slate-100">Мем-кандидаты</h2>
                    <div class="flex gap-2">
                        <select id="filter-visibility"
                            class="px-2 py-1 text-xs border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100">
                            <option value="">Все</option>
                            <option value="VISIBLE">VISIBLE</option>
                            <option value="AUTO_HIDDEN">AUTO_HIDDEN</option>
                            <option value="ADMIN_HIDDEN">ADMIN_HIDDEN</option>
                            <option value="ADMIN_FORCED_VISIBLE">ADMIN_FORCED_VISIBLE</option>
                        </select>
                        <button onclick="loadCandidates()"
                            class="px-3 py-1 text-xs bg-blue-600 hover:bg-blue-700 text-white rounded-md">
                            Обновить
                        </button>
                    </div>
                </div>

                <!-- Статус операции -->
                <div id="status-message" class="hidden mb-3 p-2 rounded text-sm"></div>

                <!-- Таблица -->
                <div class="overflow-x-auto rounded-lg border border-slate-200 dark:border-slate-700">
                    <table class="min-w-full divide-y divide-slate-200 dark:divide-slate-700 text-sm">
                        <thead class="bg-slate-50 dark:bg-slate-800">
                            <tr>
                                <th class="px-3 py-2 text-left text-xs font-medium text-slate-500 dark:text-slate-400 uppercase">ID</th>
                                <th class="px-3 py-2 text-left text-xs font-medium text-slate-500 dark:text-slate-400 uppercase">Task ID</th>
                                <th class="px-3 py-2 text-left text-xs font-medium text-slate-500 dark:text-slate-400 uppercase">Видимость</th>
                                <th class="px-3 py-2 text-center text-xs font-medium text-slate-500 dark:text-slate-400 uppercase">Лайки</th>
                                <th class="px-3 py-2 text-center text-xs font-medium text-slate-500 dark:text-slate-400 uppercase">Дизлайки</th>
                                <th class="px-3 py-2 text-left text-xs font-medium text-slate-500 dark:text-slate-400 uppercase">Пресет</th>
                                <th class="px-3 py-2 text-left text-xs font-medium text-slate-500 dark:text-slate-400 uppercase">Создан</th>
                                <th class="px-3 py-2 text-center text-xs font-medium text-slate-500 dark:text-slate-400 uppercase">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="candidates-table-body" class="bg-white dark:bg-slate-900 divide-y divide-slate-200 dark:divide-slate-700">
                            <tr>
                                <td colspan="8" class="px-3 py-4 text-center text-slate-500 dark:text-slate-400">
                                    Нажмите «Обновить» для загрузки данных
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/admin/js/auth.js"></script>
    <script src="/admin/js/api.js"></script>
    <script src="/admin/js/sidebar.js"></script>
    <script>
        const VISIBILITY_BADGE = {
            VISIBLE:              'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200',
            AUTO_HIDDEN:          'bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200',
            ADMIN_HIDDEN:         'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200',
            ADMIN_FORCED_VISIBLE: 'bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200'
        };

        function showStatus(msg, isError) {
            const el = document.getElementById('status-message');
            el.textContent = msg;
            el.className = 'mb-3 p-2 rounded text-sm ' + (isError
                ? 'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-200'
                : 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-200');
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 4000);
        }

        async function loadCandidates() {
            const visibility = document.getElementById('filter-visibility').value;
            const query = visibility ? `?visibility=${visibility}` : '';
            try {
                const data = await apiGet(`/api/meme-candidates${query}`);
                renderTable(Array.isArray(data) ? data : (data.content || []));
            } catch (e) {
                showStatus('Ошибка загрузки: ' + e.message, true);
            }
        }

        function renderTable(items) {
            const tbody = document.getElementById('candidates-table-body');
            if (!items.length) {
                tbody.innerHTML = `<tr><td colspan="8" class="px-3 py-4 text-center text-slate-500 dark:text-slate-400">Нет данных</td></tr>`;
                return;
            }
            tbody.innerHTML = items.map(c => `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50">
                    <td class="px-3 py-2 text-slate-700 dark:text-slate-300">${c.id}</td>
                    <td class="px-3 py-2 font-mono text-xs text-slate-500 dark:text-slate-400 max-w-[120px] truncate" title="${c.taskId}">${c.taskId || '—'}</td>
                    <td class="px-3 py-2">
                        <span class="px-2 py-0.5 rounded text-xs font-medium ${VISIBILITY_BADGE[c.visibility] || ''}">${c.visibility}</span>
                    </td>
                    <td class="px-3 py-2 text-center text-green-600 font-medium">${c.likesCount}</td>
                    <td class="px-3 py-2 text-center text-red-500 font-medium">${c.dislikesCount}</td>
                    <td class="px-3 py-2 text-xs text-slate-500 dark:text-slate-400">${c.stylePresetName || '—'}</td>
                    <td class="px-3 py-2 text-xs text-slate-400">${c.createdAt ? c.createdAt.slice(0, 10) : '—'}</td>
                    <td class="px-3 py-2 text-center">
                        <div class="flex gap-1 justify-center">
                            <button onclick="setVisibility(${c.id}, 'SHOW')"
                                class="px-2 py-0.5 text-xs bg-green-600 hover:bg-green-700 text-white rounded">Show</button>
                            <button onclick="setVisibility(${c.id}, 'HIDE')"
                                class="px-2 py-0.5 text-xs bg-red-600 hover:bg-red-700 text-white rounded">Hide</button>
                            <button onclick="setVisibility(${c.id}, 'RESET')"
                                class="px-2 py-0.5 text-xs bg-slate-500 hover:bg-slate-600 text-white rounded">Reset</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function setVisibility(id, action) {
            try {
                await apiPost(`/admin/meme-candidates/${id}/visibility`, { override: action });
                showStatus(`Кандидат ${id}: override = ${action}`, false);
                loadCandidates();
            } catch (e) {
                showStatus(`Ошибка: ${e.message}`, true);
            }
        }
    </script>
</body>
</html>
