<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модерация пресетов - Админ панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script src="/admin/js/theme.js"></script>
    <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body class="admin-page antialiased">
    <div class="flex h-screen overflow-hidden">
        <main class="flex-1 overflow-y-auto">
            <div class="p-4">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-slate-100">Модерация пресетов</h2>
                    <div class="flex gap-2">
                        <select id="filter-status"
                            class="px-2 py-1 text-xs border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100">
                            <option value="PENDING_MODERATION">PENDING_MODERATION</option>
                            <option value="APPROVED">APPROVED</option>
                            <option value="REJECTED">REJECTED</option>
                            <option value="DRAFT">DRAFT</option>
                        </select>
                        <button onclick="loadPresets()"
                            class="px-3 py-1 text-xs bg-blue-600 hover:bg-blue-700 text-white rounded-md">
                            Обновить
                        </button>
                    </div>
                </div>

                <div id="status-message" class="hidden mb-3 p-2 rounded text-sm"></div>

                <div class="overflow-x-auto rounded-lg border border-slate-200 dark:border-slate-700">
                    <table class="min-w-full divide-y divide-slate-200 dark:divide-slate-700 text-sm">
                        <thead class="bg-slate-50 dark:bg-slate-800">
                            <tr>
                                <th class="px-3 py-2 text-left text-xs font-medium text-slate-500 uppercase">ID</th>
                                <th class="px-3 py-2 text-left text-xs font-medium text-slate-500 uppercase">Название</th>
                                <th class="px-3 py-2 text-left text-xs font-medium text-slate-500 uppercase">Код</th>
                                <th class="px-3 py-2 text-left text-xs font-medium text-slate-500 uppercase">Статус</th>
                                <th class="px-3 py-2 text-left text-xs font-medium text-slate-500 uppercase">Владелец</th>
                                <th class="px-3 py-2 text-left text-xs font-medium text-slate-500 uppercase">Создан</th>
                                <th class="px-3 py-2 text-center text-xs font-medium text-slate-500 uppercase">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="presets-table-body" class="bg-white dark:bg-slate-900 divide-y divide-slate-200 dark:divide-slate-700">
                            <tr>
                                <td colspan="7" class="px-3 py-4 text-center text-slate-500 dark:text-slate-400">
                                    Нажмите «Обновить» для загрузки данных
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/admin/js/auth.js"></script>
    <script src="/admin/js/api.js"></script>
    <script src="/admin/js/sidebar.js"></script>
    <script>
        const STATUS_BADGE = {
            DRAFT:               'bg-slate-100 text-slate-700 dark:bg-slate-700 dark:text-slate-200',
            PENDING_MODERATION:  'bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200',
            APPROVED:            'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200',
            REJECTED:            'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200'
        };

        function showStatus(msg, isError) {
            const el = document.getElementById('status-message');
            el.textContent = msg;
            el.className = 'mb-3 p-2 rounded text-sm ' + (isError
                ? 'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-200'
                : 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-200');
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 4000);
        }

        async function loadPresets() {
            const status = document.getElementById('filter-status').value;
            try {
                // Используем admin endpoint списка всех пресетов с фильтром по статусу
                const data = await apiGet(`/admin/style-presets?moderationStatus=${status}`);
                renderTable(Array.isArray(data) ? data : (data.content || []));
            } catch (e) {
                showStatus('Ошибка загрузки: ' + e.message, true);
            }
        }

        function renderTable(items) {
            const tbody = document.getElementById('presets-table-body');
            if (!items.length) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-3 py-4 text-center text-slate-500 dark:text-slate-400">Нет данных</td></tr>`;
                return;
            }
            tbody.innerHTML = items.map(p => `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50">
                    <td class="px-3 py-2 text-slate-700 dark:text-slate-300">${p.id}</td>
                    <td class="px-3 py-2 font-medium text-slate-800 dark:text-slate-200">${p.name || '—'}</td>
                    <td class="px-3 py-2 font-mono text-xs text-slate-500">${p.code || '—'}</td>
                    <td class="px-3 py-2">
                        <span class="px-2 py-0.5 rounded text-xs font-medium ${STATUS_BADGE[p.moderationStatus] || ''}">${p.moderationStatus || '—'}</span>
                    </td>
                    <td class="px-3 py-2 text-xs text-slate-500">${p.ownerId || '—'}</td>
                    <td class="px-3 py-2 text-xs text-slate-400">${p.createdAt ? p.createdAt.slice(0, 10) : '—'}</td>
                    <td class="px-3 py-2 text-center">
                        ${p.moderationStatus === 'PENDING_MODERATION' ? `
                        <div class="flex gap-1 justify-center">
                            <button onclick="moderate(${p.id}, 'APPROVED')"
                                class="px-2 py-0.5 text-xs bg-green-600 hover:bg-green-700 text-white rounded">Одобрить</button>
                            <button onclick="moderate(${p.id}, 'REJECTED')"
                                class="px-2 py-0.5 text-xs bg-red-600 hover:bg-red-700 text-white rounded">Отклонить</button>
                        </div>` : '<span class="text-xs text-slate-400">—</span>'}
                    </td>
                </tr>
            `).join('');
        }

        async function moderate(presetId, status) {
            try {
                await apiPost(`/api/style-presets/admin/${presetId}/moderate`, { status });
                showStatus(`Пресет ${presetId}: статус → ${status}`, false);
                loadPresets();
            } catch (e) {
                showStatus(`Ошибка: ${e.message}`, true);
            }
        }
    </script>
</body>
</html>
